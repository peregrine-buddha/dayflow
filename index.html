<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DayFlow — A premium daily time scheduler to manage tasks and track hourly feedback throughout your day.">
    <title>DayFlow — Daily Time Scheduler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Particle canvas -->
    <canvas id="particle-canvas"></canvas>

    <!-- Ambient background -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- Pop particles container -->
    <div id="pop-particles"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header" id="app-header">
            <div class="header-left">
                <div class="logo-mark" id="logo-mark">
                    <div class="logo-rings">
                        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                            <circle cx="18" cy="18" r="15" stroke="url(#logoGrad1)" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5">
                                <animateTransform attributeName="transform" type="rotate" from="0 18 18" to="360 18 18" dur="20s" repeatCount="indefinite"/>
                            </circle>
                            <circle cx="18" cy="18" r="11" stroke="url(#logoGrad2)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7">
                                <animateTransform attributeName="transform" type="rotate" from="360 18 18" to="0 18 18" dur="15s" repeatCount="indefinite"/>
                            </circle>
                            <circle cx="18" cy="18" r="5" fill="url(#logoGrad1)">
                                <animate attributeName="r" values="4;5.5;4" dur="3s" repeatCount="indefinite"/>
                            </circle>
                            <line x1="18" y1="18" x2="18" y2="8" stroke="url(#logoGrad1)" stroke-width="2" stroke-linecap="round">
                                <animateTransform attributeName="transform" type="rotate" from="0 18 18" to="360 18 18" dur="60s" repeatCount="indefinite"/>
                            </line>
                            <line x1="18" y1="18" x2="24" y2="18" stroke="url(#logoGrad2)" stroke-width="1.5" stroke-linecap="round">
                                <animateTransform attributeName="transform" type="rotate" from="0 18 18" to="360 18 18" dur="3600s" repeatCount="indefinite"/>
                            </line>
                            <defs>
                                <linearGradient id="logoGrad1" x1="0" y1="0" x2="36" y2="36">
                                    <stop stop-color="#c084fc"/>
                                    <stop offset="1" stop-color="#818cf8"/>
                                </linearGradient>
                                <linearGradient id="logoGrad2" x1="36" y1="0" x2="0" y2="36">
                                    <stop stop-color="#f472b6"/>
                                    <stop offset="1" stop-color="#c084fc"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                </div>
                <div class="header-text">
                    <h1 class="app-title">
                        <span class="title-letter" style="--i:0">D</span><span class="title-letter" style="--i:1">a</span><span class="title-letter" style="--i:2">y</span><span class="title-letter" style="--i:3">F</span><span class="title-letter" style="--i:4">l</span><span class="title-letter" style="--i:5">o</span><span class="title-letter" style="--i:6">w</span>
                    </h1>
                    <p class="app-subtitle">Your daily rhythm, organized</p>
                </div>
            </div>
            <div class="header-right">
                <div class="date-nav">
                    <button class="date-nav-btn" id="prev-day" aria-label="Previous day">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <button class="date-display" id="date-display"></button>
                    <button class="date-nav-btn" id="next-day" aria-label="Next day">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                </div>
                <button class="today-btn" id="today-btn">
                    <span class="today-btn-glow"></span>
                    <span class="today-btn-text">Today</span>
                </button>
            </div>
        </header>

        <!-- Stats bar -->
        <div class="stats-bar" id="stats-bar">
            <div class="stat-card stat-card-tasks">
                <div class="stat-card-bg"></div>
                <div class="stat-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-completed">0/0</span>
                    <span class="stat-label">Tasks Done</span>
                </div>
                <div class="stat-bar-track">
                    <div class="stat-bar-fill" id="stat-bar-fill" style="width: 0%"></div>
                </div>
            </div>
            <div class="stat-card stat-card-progress">
                <div class="stat-card-bg"></div>
                <div class="stat-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-progress">0%</span>
                    <span class="stat-label">Progress</span>
                </div>
                <div class="stat-progress-ring">
                    <svg viewBox="0 0 44 44" width="44" height="44">
                        <circle class="ring-bg" cx="22" cy="22" r="18" fill="none" stroke-width="3"/>
                        <circle class="ring-fill" id="progress-ring" cx="22" cy="22" r="18" fill="none" stroke-width="3" stroke-dasharray="113.1 113.1" stroke-dashoffset="113.1"/>
                    </svg>
                </div>
            </div>
            <div class="stat-card stat-card-feedback">
                <div class="stat-card-bg"></div>
                <div class="stat-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-feedback">0</span>
                    <span class="stat-label">Feedbacks</span>
                </div>
            </div>
            <div class="stat-card stat-card-streak">
                <div class="stat-card-bg"></div>
                <div class="stat-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-streak">—</span>
                    <span class="stat-label">Streak</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Tasks Panel -->
            <section class="panel tasks-panel" id="tasks-panel">
                <div class="panel-glow"></div>
                <div class="panel-header">
                    <div class="panel-title-group">
                        <h2 class="panel-title">
                            <span class="panel-title-icon">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/></svg>
                            </span>
                            Daily Tasks
                        </h2>
                        <span class="panel-badge" id="tasks-count">0 tasks</span>
                    </div>
                    <button class="filter-btn" id="filter-btn" title="Filter tasks">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                        <span id="filter-label">All</span>
                    </button>
                </div>

                <!-- Add Task -->
                <form class="add-task-form" id="add-task-form">
                    <div class="task-input-wrapper">
                        <div class="input-glow"></div>
                        <input type="text" class="task-input" id="task-input" placeholder="✨ What needs to be done?" maxlength="200" autocomplete="off">
                        <select class="priority-select" id="priority-select" title="Priority">
                            <option value="low">🟢 Low</option>
                            <option value="medium" selected>🟡 Med</option>
                            <option value="high">🔴 High</option>
                        </select>
                        <button type="submit" class="add-task-btn" id="add-task-btn" title="Add task">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                    </div>
                </form>

                <!-- Task list -->
                <div class="task-list" id="task-list">
                    <!-- tasks rendered by JS -->
                </div>
                <div class="empty-state" id="tasks-empty">
                    <div class="empty-illustration">
                        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                            <rect x="12" y="12" width="40" height="40" rx="8" stroke="url(#emptyGrad)" stroke-width="1.5" opacity="0.3"/>
                            <path d="M26 32l4 4 8-8" stroke="url(#emptyGrad)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
                            <defs><linearGradient id="emptyGrad" x1="12" y1="12" x2="52" y2="52"><stop stop-color="#c084fc"/><stop offset="1" stop-color="#818cf8"/></linearGradient></defs>
                        </svg>
                    </div>
                    <p>No tasks yet — add one above!</p>
                    <span class="empty-hint">Press Enter to add quickly</span>
                </div>
            </section>

            <!-- Hourly Feedback Panel -->
            <section class="panel feedback-panel" id="feedback-panel">
                <div class="panel-glow"></div>
                <div class="panel-header">
                    <div class="panel-title-group">
                        <h2 class="panel-title">
                            <span class="panel-title-icon">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            </span>
                            Hourly Feedback
                        </h2>
                        <span class="panel-badge" id="feedback-count">0 entries</span>
                    </div>
                    <div class="time-indicator" id="time-indicator">
                        <span class="pulse-dot"></span>
                        <span id="current-time"></span>
                    </div>
                </div>

                <div class="feedback-timeline" id="feedback-timeline">
                    <!-- feedback slots rendered by JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
