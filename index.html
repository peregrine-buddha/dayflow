<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DayFlow — A premium daily time scheduler to manage tasks and track hourly feedback throughout your day.">
    <title>DayFlow — Daily Time Scheduler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Ambient background orbs -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header" id="app-header">
            <div class="header-left">
                <div class="logo-mark">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <circle cx="14" cy="14" r="12" stroke="url(#logoGrad)" stroke-width="2.5" stroke-dasharray="4 3"/>
                        <circle cx="14" cy="14" r="4" fill="url(#logoGrad)"/>
                        <line x1="14" y1="14" x2="14" y2="6" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round"/>
                        <line x1="14" y1="14" x2="20" y2="14" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round"/>
                        <defs>
                            <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
                                <stop stop-color="#a78bfa"/>
                                <stop offset="1" stop-color="#6366f1"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div>
                    <h1 class="app-title">DayFlow</h1>
                    <p class="app-subtitle">Your daily rhythm, organized</p>
                </div>
            </div>
            <div class="header-right">
                <div class="date-nav">
                    <button class="date-nav-btn" id="prev-day" aria-label="Previous day">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <button class="date-display" id="date-display"></button>
                    <button class="date-nav-btn" id="next-day" aria-label="Next day">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                </div>
                <button class="today-btn" id="today-btn">Today</button>
            </div>
        </header>

        <!-- Stats bar -->
        <div class="stats-bar" id="stats-bar">
            <div class="stat-card">
                <div class="stat-icon stat-icon-tasks">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-completed">0/0</span>
                    <span class="stat-label">Tasks Done</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-progress">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-progress">0%</span>
                    <span class="stat-label">Progress</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-feedback">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-feedback">0</span>
                    <span class="stat-label">Feedbacks</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-progress-ring">
                    <svg viewBox="0 0 36 36" width="42" height="42">
                        <circle class="ring-bg" cx="18" cy="18" r="15.9" fill="none" stroke-width="2.5"/>
                        <circle class="ring-fill" id="progress-ring" cx="18" cy="18" r="15.9" fill="none" stroke-width="2.5" stroke-dasharray="100 100" stroke-dashoffset="100"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Tasks Panel -->
            <section class="panel tasks-panel" id="tasks-panel">
                <div class="panel-header">
                    <div class="panel-title-group">
                        <h2 class="panel-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/></svg>
                            Daily Tasks
                        </h2>
                        <span class="panel-badge" id="tasks-count">0 tasks</span>
                    </div>
                    <button class="filter-btn" id="filter-btn" title="Filter tasks">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                        <span id="filter-label">All</span>
                    </button>
                </div>

                <!-- Add Task -->
                <form class="add-task-form" id="add-task-form">
                    <div class="task-input-wrapper">
                        <input type="text" class="task-input" id="task-input" placeholder="What needs to be done?" maxlength="200" autocomplete="off">
                        <select class="priority-select" id="priority-select" title="Priority">
                            <option value="low">🟢 Low</option>
                            <option value="medium" selected>🟡 Medium</option>
                            <option value="high">🔴 High</option>
                        </select>
                        <button type="submit" class="add-task-btn" id="add-task-btn" title="Add task">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                    </div>
                </form>

                <!-- Task list -->
                <div class="task-list" id="task-list">
                    <!-- tasks rendered by JS -->
                </div>
                <div class="empty-state" id="tasks-empty">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.3"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/></svg>
                    <p>No tasks yet — add one above!</p>
                </div>
            </section>

            <!-- Hourly Feedback Panel -->
            <section class="panel feedback-panel" id="feedback-panel">
                <div class="panel-header">
                    <div class="panel-title-group">
                        <h2 class="panel-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            Hourly Feedback
                        </h2>
                        <span class="panel-badge" id="feedback-count">0 entries</span>
                    </div>
                    <div class="time-indicator" id="time-indicator">
                        <span class="pulse-dot"></span>
                        <span id="current-time"></span>
                    </div>
                </div>

                <div class="feedback-timeline" id="feedback-timeline">
                    <!-- feedback slots rendered by JS -->
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
